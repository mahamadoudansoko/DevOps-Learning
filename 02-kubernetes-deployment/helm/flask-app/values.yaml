# Default values for flask-app

namespace: flask-app

flask:
  replicaCount: 3

  image:
    repository: dansokomaha/optimized-flask-api
    tag: latest

  service:
    type: ClusterIP

  ingress:
    host: flask-api.local

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

postgres:
  image:
    tag: 15-alpine
  storage: 1Gi