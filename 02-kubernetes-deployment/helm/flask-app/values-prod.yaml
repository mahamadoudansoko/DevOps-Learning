# Production environment overrides
namespace: flask-app

flask:
  replicaCount: 5

  image:
    repository: dansokomaha/optimized-flask-api
    tag: latest

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70

postgres:
  storage: 10Gi