apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flask-app

bases:
- ../../base

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: flask-api
    spec:
      replicas: 1
      template:
        spec:
          containers:
          - name: flask
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
  target:
    kind: Deployment
    name: flask-api

commonLabels:
  environment: dev