apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: flask-app
  labels:
    app: flask-api
spec:
  type: ClusterIP  # Internal only, accessed via Ingress
  selector:
    app: flask-api
  ports:
  - port: 80         # Service port
    targetPort: 5000 # Container port
    protocol: TCP
    name: http
  
  # Session affinity (optional, for sticky sessions)
  sessionAffinity: ClientIP