apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  namespace: flask-app
  labels:
    app: flask-api
    tier: backend
spec:
  # Start with 3 replicas (HPA will adjust this)
  replicas: 3
  
  # Rolling update strategy (zero downtime)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Max 1 extra pod during update
      maxUnavailable: 0  # Always keep all pods running
  
  selector:
    matchLabels:
      app: flask-api
  
  template:
    metadata:
      labels:
        app: flask-api
        tier: backend
    
    spec:
      containers:
      - name: flask
        image: dansokomaha/optimized-flask-api:latest
        
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: flask-config
        
        # Environment variables from Secret
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: API_KEY
        
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_USER
        
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_PASSWORD
        
        # Resource limits (important for HPA)
        resources:
          requests:
            cpu: 100m      # 0.1 CPU core minimum
            memory: 128Mi  # 128 MB minimum
          limits:
            cpu: 500m      # 0.5 CPU core maximum
            memory: 512Mi  # 512 MB maximum
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Security context (non-root user)
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false